name: Update Version
description: Increments the patch version in pom.xml and package.json files

inputs:
  dry_run:
    description: "Dry run. No real changes should occur."
    required: false
    default: 'true'
  npm_registry:
    description: "NPM registry URL"
    required: true
  artifactory_user:
    description: "Artifactory username"
    required: true
  artifactory_password:
    description: "Artifactory password"
    required: true
  github_token:
    description: "GitHub token for pushing changes"
    required: true

runs:
  using: composite
  steps:
    - name: Retrieve settings file
      id: common-maven
      uses: pentaho/actions-common@stable

    - name: Copy settings.xml to .m2 directory
      shell: bash
      run: cp "${{ steps.common-maven.outputs.settings-file-path }}" /root/.m2

    - name: Get current version
      id: get-version
      shell: bash
      run: |
        current_version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "Current version: $current_version"
        echo "current_version=$current_version" >> $GITHUB_OUTPUT

    - name: Increment patch version
      id: increment-version
      shell: bash
      run: |
        current_version=${{ steps.get-version.outputs.current_version }}

        # Remove the -SNAPSHOT suffix if present
        base_version=${current_version%-SNAPSHOT}

        # Split into array
        IFS='.' read -r -a parts <<< "$base_version"
        last_index=$((${#parts[@]} - 1))
        parts[$last_index]=$((parts[$last_index] + 1))

        # Reconstruct version, joining the parts by dots
        new_version=$(IFS='.'; echo "${parts[*]}")
        
        clean_new_version="$new_version"

        # Reattach the -SNAPSHOT suffix if it was present
        if [[ "$current_version" == *-SNAPSHOT ]]; then
          new_version="$new_version-SNAPSHOT"
        fi

        echo "New version: $new_version"
        echo "Clean new version: $clean_new_version"
        echo "new_version=$new_version" >> $GITHUB_OUTPUT
        echo "clean_new_version=$clean_new_version" >> $GITHUB_OUTPUT

    - name: Update Maven version
      shell: bash
      run: mvn versions:set -DnewVersion=${{ steps.increment-version.outputs.new_version }}

    - name: Configure Git
      uses: pentaho/actions-common/.github/actions/git-config@stable

    - name: Detect npm
      id: detect-npm
      uses: pentaho/actions-common/.github/actions/detect-npm@stable

    - name: NPM authentication
      if: ${{ steps.detect-npm.outputs.has_npm == 'true' }}
      uses: pentaho/actions-common/.github/actions/npm-registry-auth@stable
      with:
        pentaho_registry: ${{ inputs.npm_registry }}
        username: ${{ inputs.artifactory_user }}
        password: ${{ inputs.artifactory_password }}

    - name: Install dependencies
      if: ${{ steps.detect-npm.outputs.has_npm == 'true' }}
      shell: bash
      run: npm ci

    - name: Update NPM version
      if: ${{ steps.detect-npm.outputs.has_npm == 'true' }}
      shell: bash
      run: |
        npm run --if-present version:set -- ${{ steps.increment-version.outputs.clean_new_version }}
        npm run --if-present version:print

    - name: Commit changes
      if: ${{ inputs.dry_run == 'false' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        # Add files individually, ignoring errors for non-existent files
        find . -name "pom.xml" -exec git add {} \; 2>/dev/null || true
        find . -name "package.json" -exec git add {} \; 2>/dev/null || true
        find . -name "package-lock.json" -exec git add {} \; 2>/dev/null || true
        git add lerna.json 2>/dev/null || true

        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update version to ${{ steps.increment-version.outputs.new_version }}"
          git push
        fi
