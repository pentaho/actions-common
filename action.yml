name: "Common Pentaho files"
description: "Common Pentaho files"

outputs:
  settings-file-path:
    description: "Maven settings file path"
    value: ${{ steps.settings-file.outputs.path }}
  release-versions-file-path:
    description: "Release versions properties file path"
    value: ${{ steps.release-versions-file.outputs.release-props-path }}

runs:
  using: "composite"
  steps:

    - name: 'Checkout code'
      uses: actions/checkout@v7

    - name: 'settings.xml'
      id: settings-file
      shell: sh
      run: |
        file_path="$GITHUB_ACTION_PATH/settings.xml"
        echo "path=${file_path}" >> $GITHUB_OUTPUT

    - name: 'release-versions.properties'
      id: release-versions-file
      shell: sh
      run: |
          file_path="$GITHUB_ACTION_PATH/release-versions.properties"
          echo "release-props-path=${file_path}" >> $GITHUB_OUTPUT
